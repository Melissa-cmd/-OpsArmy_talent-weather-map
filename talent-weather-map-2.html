<style>

    --text: #c8d8c0; --dim: #4a5a44;
    --mono: 'Share Tech Mono', monospace; --sans: 'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 10px 18px; display: flex; align-items: center; gap: 18px; flex-shrink: 0; }
  .logo { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; line-height: 1.3; }
  .logo span { color: var(--dim); display: block; }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: #fff; }
  .header-title em { color: var(--accent); font-style: normal; }
  .status-bar { margin-left: auto; display: flex; gap: 18px; align-items: center; }
  .stat { font-family: var(--mono); font-size: 11px; color: var(--dim); display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat strong { color: var(--accent); font-size: 16px; }
  .stat.warn strong { color: var(--warn); }
  .stat.danger strong { color: var(--danger); }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: blink 1.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(58,255,106,.5)} 50%{opacity:.6;box-shadow:0 0 0 6px rgba(58,255,106,0)} }
  .timestamp { font-family: var(--mono); font-size: 10px; color: var(--dim); }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 340px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sb-sec { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .lbl { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .lbl::after { content:''; flex:1; height:1px; background:var(--border); }
  input[type=text] { background: rgba(255,255,255,.04); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; font-family: var(--mono); font-size: 12px; border-radius: 3px; outline: none; transition: border-color .2s; }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--dim); }
  .row { display: flex; gap: 6px; }
  .btn { background: var(--accent); color: #000; border: none; padding: 7px 12px; font-family: var(--mono); font-size: 11px; font-weight: bold; border-radius: 3px; cursor: pointer; letter-spacing: 1px; transition: opacity .2s; white-space: nowrap; }
  .btn:hover { opacity: .85; }
  .filters { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--dim); cursor: pointer; transition: all .15s; user-select: none; }
  .pill.on { border-color: var(--accent); color: var(--accent); background: rgba(58,255,106,.08); }
  .pill.on.w { border-color: var(--warn); color: var(--warn); background: rgba(255,184,0,.08); }
  .pill.on.d { border-color: var(--danger); color: var(--danger); background: rgba(255,58,58,.08); }
  .prog-wrap { margin-top: 8px; }
  .prog-bar-bg { background: rgba(255,255,255,.04); border-radius: 2px; overflow: hidden; height: 3px; }
  .prog-bar { height: 100%; background: var(--accent); transition: width .3s; border-radius: 2px; width: 0%; }
  .prog-lbl { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 4px; }
  .tlist { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .tlist::-webkit-scrollbar { width: 4px; }
  .tlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .ti { padding: 9px 14px; border-bottom: 1px solid rgba(30,45,34,.5); cursor: pointer; transition: background .15s; display: flex; align-items: center; gap: 9px; }
  .ti:hover { background: rgba(58,255,106,.04); }
  .ti.active { background: rgba(58,255,106,.07); border-left: 2px solid var(--accent); padding-left: 12px; }
  .ti.hide { display: none; }
  .wicon { font-size: 20px; flex-shrink: 0; width: 24px; text-align: center; line-height: 1; }
  .tinfo { flex: 1; min-width: 0; }
  .tclient { font-family: var(--mono); font-size: 9px; color: var(--accent2); letter-spacing: 1px; text-transform: uppercase; }
  .tname { font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tloc { font-family: var(--mono); font-size: 10px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .twx { font-family: var(--mono); font-size: 10px; color: var(--text); margin-top: 1px; }
  .badge { font-size: 9px; font-family: var(--mono); padding: 2px 5px; border-radius: 2px; font-weight: bold; letter-spacing: 1px; flex-shrink: 0; }
  .bc { background: rgba(58,255,106,.12); color: var(--accent); }
  .bw { background: rgba(255,184,0,.12); color: var(--warn); }
  .ba { background: rgba(255,58,58,.18); color: var(--danger); }
  .bp { border: 1px solid var(--border); color: var(--dim); }
  .spin { width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: rot .7s linear infinite; flex-shrink: 0; }
  @keyframes rot { to { transform: rotate(360deg); } }
  .nodata { padding: 20px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--dim); display: none; }
  .legend { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; gap: 14px; flex-wrap: wrap; }
  .li { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--dim); }
  .ld { width: 7px; height: 7px; border-radius: 50%; }
  #map { flex: 1; background: #0a0d0f; }
  .leaflet-container { background: #0d1117; font-family: var(--sans); }
  .leaflet-tile-pane { filter: brightness(.7) saturate(.35) hue-rotate(115deg); }
  .leaflet-control-zoom a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--border) !important; }
  .mw { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
  .mb { background: var(--panel); border: 1.5px solid var(--accent); border-radius: 6px; padding: 3px 7px; display: flex; align-items: center; gap: 4px; box-shadow: 0 0 10px rgba(58,255,106,.25), 0 2px 8px rgba(0,0,0,.8); white-space: nowrap; }
  .mb.w { border-color: var(--warn); box-shadow: 0 0 10px rgba(255,184,0,.25), 0 2px 8px rgba(0,0,0,.8); }
  .mb.a { border-color: var(--danger); box-shadow: 0 0 10px rgba(255,58,58,.35), 0 2px 8px rgba(0,0,0,.8); }
  .me { font-size: 14px; line-height: 1; }
  .mt { font-family: var(--mono); font-size: 11px; color: #fff; font-weight: bold; }
  .mn { font-family: var(--sans); font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text); max-width: 70px; overflow: hidden; text-overflow: ellipsis; }
  .mp { width: 2px; height: 8px; background: var(--accent); }
  .mp.w { background: var(--warn); } .mp.a { background: var(--danger); }
  .leaflet-popup-content-wrapper { background: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 6px !important; box-shadow: 0 4px 20px rgba(0,0,0,.8) !important; color: var(--text) !important; }
  .leaflet-popup-tip { background: var(--panel) !important; }
  .pc { font-family: var(--sans); min-width: 220px; }
  .ph { font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .pi { font-size: 26px; }
  .pcl { font-family: var(--mono); font-size: 9px; color: var(--accent2); letter-spacing: 1px; }
  .pr { display: flex; flex-direction: column; gap: 4px; }
  .prr { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .pl { color: var(--dim); font-family: var(--mono); font-size: 10px; letter-spacing: 1px; }
  .pv { font-weight: 600; color: var(--text); }
  .pal { margin-top: 8px; padding: 5px 8px; border-radius: 3px; font-family: var(--mono); font-size: 10px; letter-spacing: 1px; }
  .pal.a { background: rgba(255,58,58,.1); border: 1px solid var(--danger); color: var(--danger); }
  .pal.w { background: rgba(255,184,0,.1); border: 1px solid var(--warn); color: var(--warn); }
</style>

        <div class="pill on w" data-f="watch" onclick="togglePill(this)">⚡ WATCH</div>
        <div class="pill on" data-f="clear" onclick="togglePill(this)">✓ CLEAR</div>
        <div class="pill on" data-f="pending" onclick="togglePill(this)">⏳ PENDING</div>
      </div>
      <div class="prog-wrap" id="progWrap">
        <div class="prog-bar-bg"><div class="prog-bar" id="prog"></div></div>
        <div class="prog-lbl" id="progLbl">Starting up...</div>
      </div>
    </div>
    <div class="tlist" id="tlist"></div>
    <div class="nodata" id="nodata">No matching talents.</div>
    <div class="legend">

    </div>
  </div>

</div>

  {n:"Yumel",c:"OPS Army",a:"Culiacan, Sinaloa, Mexico"},
  {n:"Mike (OPS)",c:"OPS Army",a:"Quezon City, Philippines"},
  {n:"Alyssa Petrola",c:"L Suite Content Team",a:"Philippines"},
  {n:"Maine Garcia",c:"",a:"Philippines"},
  {n:"Marvin Garil",c:"Codes Health",a:"Philippines"},
];

const WMO = {
  0:{l:'Clear Sky',e:'☀️',s:0},1:{l:'Mostly Clear',e:'🌤️',s:0},2:{l:'Partly Cloudy',e:'⛅',s:0},
  3:{l:'Overcast',e:'☁️',s:0},45:{l:'Fog',e:'🌫️',s:1},48:{l:'Icy Fog',e:'🌫️',s:1},
  51:{l:'Light Drizzle',e:'🌦️',s:0},53:{l:'Drizzle',e:'🌦️',s:0},55:{l:'Heavy Drizzle',e:'🌧️',s:1},
  61:{l:'Light Rain',e:'🌧️',s:0},63:{l:'Moderate Rain',e:'🌧️',s:1},65:{l:'Heavy Rain',e:'🌧️',s:1},
  66:{l:'Freezing Rain',e:'🌨️',s:2},67:{l:'Heavy Fr.Rain',e:'🌨️',s:2},
  71:{l:'Light Snow',e:'🌨️',s:1},73:{l:'Mod. Snow',e:'❄️',s:1},75:{l:'Heavy Snow',e:'❄️',s:2},
  77:{l:'Snow Grains',e:'🌨️',s:1},80:{l:'Light Showers',e:'🌦️',s:0},81:{l:'Showers',e:'🌧️',s:1},
  82:{l:'Heavy Showers',e:'⛈️',s:2},85:{l:'Snow Showers',e:'🌨️',s:1},86:{l:'Heavy Snow',e:'❄️',s:2},
  95:{l:'Thunderstorm',e:'⛈️',s:2},96:{l:'T-Storm+Hail',e:'⛈️',s:2},99:{l:'Heavy T-Storm',e:'🌩️',s:2},
};
const wi = c => WMO[c] || {l:'Unknown',e:'❓',s:0};
const sc = s => s===2?'a':s===1?'w':'c';

const talents = [];
let lmap, loaded=0, total=0;
const activeF = new Set(['all','alert','watch','clear','pending']);

lmap = L.map('map').setView([15,115],3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:18}).addTo(lmap);

setInterval(()=>{ document.getElementById('clk').textContent = new Date().toUTCString().replace('GMT','Z').slice(5,25).toUpperCase(); },1000);

async function geo(addr){
  const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`,{headers:{'Accept-Language':'en'}});
  const d = await r.json();
  if(!d.length) throw new Error('not found');
  return {lat:+d[0].lat, lon:+d[0].lon, disp:d[0].display_name.split(',').slice(0,3).join(',').trim()};
}
async function wxfetch(lat,lon){
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,wind_gusts_10m,relative_humidity_2m,weathercode,precipitation&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`);
  const d = await r.json(); const c=d.current;
  return {temp:Math.round(c.temperature_2m),wind:Math.round(c.wind_speed_10m),gusts:Math.round(c.wind_gusts_10m),hum:c.relative_humidity_2m,precip:c.precipitation,code:c.weathercode};
}

function mkIcon(t){
  const w=t.wx, cls=w?sc(wi(w.code).s):'c';
  const html=w
    ?`<div class="mw"><div class="mb ${cls}"><span class="me">${wi(w.code).e}</span><div><div class="mt">${w.temp}°F</div><div class="mn">${t.n.split(' ')[0]}</div></div></div><div class="mp ${cls}"></div></div>`
    :`<div class="mw"><div class="mb"><span class="me">⏳</span><div class="mn">${t.n.split(' ')[0]}</div></div><div class="mp"></div></div>`;
  return L.divIcon({className:'',html,iconSize:[0,0],iconAnchor:[45,50]});
}

function popHtml(t){
  const w=t.wx;
  if(!w) return `<div class="pc"><div class="ph"><span class="pi">⏳</span><div><div>${t.n}</div><div class="pcl">${t.c||'—'}</div></div></div><div style="font-family:var(--mono);font-size:11px;color:var(--dim)">Loading weather...</div></div>`;
  const inf=wi(w.code),cls=sc(inf.s);
  const al=cls==='a'?`<div class="pal a">⚠ SEVERE WEATHER ALERT</div>`:cls==='w'?`<div class="pal w">⚡ WEATHER WATCH</div>`:'';
  return `<div class="pc"><div class="ph"><span class="pi">${inf.e}</span><div><div>${t.n}</div><div class="pcl">${t.c||'—'}</div><div style="font-family:var(--mono);font-size:9px;color:var(--dim)">${t.geo?.disp||t.a}</div></div></div><div class="pr"><div class="prr"><span class="pl">CONDITION</span><span class="pv">${inf.l}</span></div><div class="prr"><span class="pl">TEMP</span><span class="pv">${w.temp}°F</span></div><div class="prr"><span class="pl">WIND</span><span class="pv">${w.wind} mph</span></div><div class="prr"><span class="pl">GUSTS</span><span class="pv" ${w.gusts>35?'style="color:var(--warn)"':''}>${w.gusts} mph</span></div><div class="prr"><span class="pl">HUMIDITY</span><span class="pv">${w.hum}%</span></div><div class="prr"><span class="pl">PRECIP</span><span class="pv">${w.precip} mm</span></div></div>${al}</div>`;
}

function renderItem(t){
  const w=t.wx, inf=w?wi(w.code):null;
  const sevKey = w?(inf.s===2?'alert':inf.s===1?'watch':'clear'):'pending';
  const bCls = w?(inf.s===2?'ba':inf.s===1?'bw':'bc'):'bp';
  const bTxt = w?(inf.s===2?'ALERT':inf.s===1?'WATCH':'CLEAR'):'PEND';
  const html=`<div class="wicon">${w?inf.e:'⏳'}</div><div class="tinfo"><div class="tclient">${t.c||'—'}</div><div class="tname">${t.n}</div><div class="tloc">${t.geo?.disp||t.a}</div>${w?`<div class="twx">${w.temp}°F · ${w.wind}mph · ${inf.l}</div>`:'<div class="twx" style="color:var(--dim)">Fetching weather...</div>'}</div><span class="badge ${bCls}">${bTxt}</span>`;
  let el=document.getElementById('ti'+t.id);
  if(el){ el.innerHTML=html; el.setAttribute('data-sev',sevKey); }
  else{
    el=document.createElement('div');
    el.className='ti'; el.id='ti'+t.id;
    el.setAttribute('data-sev',sevKey);
    el.setAttribute('data-n',t.n.toLowerCase());
    el.setAttribute('data-c',(t.c||'').toLowerCase());
    el.innerHTML=html;
    el.addEventListener('click',()=>activate(t.id));
    document.getElementById('tlist').appendChild(el);
  }
  visEl(el);
}

function visEl(el){
  const sev=el.getAttribute('data-sev');
  const nm=el.getAttribute('data-n'), cl=el.getAttribute('data-c');
  const srch=document.getElementById('srch').value.toLowerCase();
  const fMatch=activeF.has('all')||activeF.has(sev);
  const sMatch=!srch||nm.includes(srch)||cl.includes(srch);
  el.classList.toggle('hide',!(fMatch&&sMatch));
}

function applyFilters(){
  document.querySelectorAll('.ti').forEach(visEl);
  const vis=document.querySelectorAll('.ti:not(.hide)').length;
  document.getElementById('nodata').style.display=vis===0?'block':'none';
}

function togglePill(el){
  const f=el.getAttribute('data-f');
  if(f==='all'){
    const allOn=activeF.has('all');
    if(allOn){activeF.clear();document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));}
    else{activeF.add('all');activeF.add('alert');activeF.add('watch');activeF.add('clear');activeF.add('pending');document.querySelectorAll('.pill').forEach(p=>p.classList.add('on'));}
  } else {
    activeF.delete('all');document.querySelector('[data-f="all"]').classList.remove('on');
    if(activeF.has(f)){activeF.delete(f);el.classList.remove('on');}
    else{activeF.add(f);el.classList.add('on');}
  }
  applyFilters();
}

function activate(id){
  document.querySelectorAll('.ti').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ti'+id);
  if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
  const t=talents.find(x=>x.id===id);
  if(t?.marker&&t.geo){lmap.setView([t.geo.lat,t.geo.lon],10);t.marker.openPopup();}
}

function updateStats(){
  const done=talents.filter(t=>t.wx);
  const pend=talents.filter(t=>!t.wx&&!t.fail);
  let w=0,a=0;
  done.forEach(t=>{const s=wi(t.wx.code).s;if(s===2)a++;else if(s===1)w++;});
  document.getElementById('sTotal').textContent=done.length;
  document.getElementById('sWatch').textContent=w;
  document.getElementById('sAlert').textContent=a;
  document.getElementById('sPend').textContent=pend.length;
}

async function loadOne(t, delay){
  renderItem(t);
  await new Promise(r=>setTimeout(r,delay));
  try{
    const g=await geo(t.a);
    t.geo=g;
    const mk=L.marker([g.lat,g.lon],{icon:mkIcon(t)}).addTo(lmap).bindPopup(popHtml(t),{maxWidth:280});
    t.marker=mk;
    mk.on('click',()=>activate(t.id));
    const w=await wxfetch(g.lat,g.lon);
    t.wx=w;
    mk.setIcon(mkIcon(t));
    mk.setPopupContent(popHtml(t));
  }catch(e){ t.fail=true; }
  loaded++;
  renderItem(t);
  updateStats();
  const pct=Math.round((loaded/total)*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('progLbl').textContent=`${loaded}/${total} talents loaded (${pct}%)`;
  if(loaded===total) setTimeout(()=>document.getElementById('progWrap').style.display='none',3000);
}

async function addManual(){
  const nm=(document.getElementById('aN').value.trim()||'TALENT').toUpperCase();
  const addr=document.getElementById('aL').value.trim();
  if(!addr)return;
  document.getElementById('aN').value='';document.getElementById('aL').value='';
  const t={id:Date.now(),n:nm,c:'Manual',a:addr,wx:null,geo:null,marker:null,fail:false};
  talents.push(t); total++;
  await loadOne(t,0);
}
document.getElementById('aL').addEventListener('keydown',e=>{if(e.key==='Enter')addManual();});

// Boot
total=TALENTS_RAW.length;
document.getElementById('progLbl').textContent=`0/${total} talents loading...`;
TALENTS_RAW.forEach((d,i)=>{
  const t={id:i+1,n:d.n,c:d.c,a:d.a,wx:null,geo:null,marker:null,fail:false};
  talents.push(t);
  loadOne(t, i*300);
});
</script>
</body>
